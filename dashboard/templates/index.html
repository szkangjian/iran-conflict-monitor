<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iran Conflict Monitor</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --critical: #f85149;
      --high: #e3b341;
      --medium: #3fb950;
      --low: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 18px; font-weight: 600; }
    .pulse { width: 10px; height: 10px; border-radius: 50%; background: var(--critical); box-shadow: 0 0 6px var(--critical); animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Language toggle */
    #lang-toggle {
      margin-left: auto;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .15s;
    }
    #lang-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .layout { display: grid; grid-template-columns: 220px 1fr; height: calc(100vh - 57px); }

    /* Sidebar */
    aside { background: var(--surface); border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; }
    aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 12px; }
    .stat-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .stat-row:last-child { border: none; }
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge.critical { background: #3d1a1a; color: var(--critical); }
    .badge.high { background: #3d2e0a; color: var(--high); }
    .badge.medium { background: #0e2e16; color: var(--medium); }
    .badge.low { background: #1c2128; color: var(--low); }

    .filter-group { margin-top: 20px; }
    .filter-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    select, input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: 13px; margin-bottom: 8px; }
    button#apply-btn { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button#apply-btn:hover { opacity: 0.85; }

    /* Main */
    main { overflow-y: auto; padding: 16px 20px; }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    #search { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px 12px; font-size: 14px; }
    #search::placeholder { color: var(--muted); }
    #last-updated { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
    td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:hover td { background: var(--surface); }

    .sev { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .sev.critical { background: #3d1a1a; color: var(--critical); }
    .sev.high     { background: #3d2e0a; color: var(--high); }
    .sev.medium   { background: #0e2e16; color: var(--medium); }
    .sev.low      { background: #1c2128; color: var(--low); }

    .event-title a { color: var(--text); text-decoration: none; font-weight: 500; }
    .event-title a:hover { color: var(--accent); text-decoration: underline; }
    .event-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .tag { display: inline-block; background: #1c2128; border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 11px; color: var(--muted); margin: 2px 2px 0 0; }

    #empty { text-align: center; color: var(--muted); padding: 48px; }
    .loading { color: var(--muted); text-align: center; padding: 32px; }

    /* Score banner */
    #score-banner {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .score-number {
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      min-width: 72px;
    }
    .score-level {
      font-size: 15px;
      font-weight: 600;
    }
    .score-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .dims {
      display: flex;
      gap: 12px;
      flex: 1;
      align-items: center;
      flex-wrap: wrap;
    }
    .dim-item { display: flex; flex-direction: column; gap: 3px; min-width: 60px; }
    .dim-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .dim-bar-wrap { background: var(--bg); border-radius: 3px; height: 6px; width: 80px; }
    .dim-bar { height: 6px; border-radius: 3px; transition: width .4s; }
    .dim-val { font-size: 11px; color: var(--muted); }
    .nuclear-badge {
      background: #3d1a1a;
      color: var(--critical);
      border: 1px solid var(--critical);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
      display: none;
    }

    /* Score color scale */
    .score-l0  { color: var(--low); }
    .score-l20 { color: var(--medium); }
    .score-l40 { color: var(--high); }
    .score-l60 { color: #ff8c42; }
    .score-l80 { color: var(--critical); }
  </style>
</head>
<body>

<header>
  <div class="pulse"></div>
  <h1 data-i18n="title">Iran Conflict Monitor</h1>
  <span id="header-count" style="color:var(--muted);font-size:13px;"></span>
  <button id="lang-toggle" onclick="toggleLang()" title="切换语言 / Switch Language">🌐 <span id="lang-label">中文</span></button>
</header>

<!-- Score banner -->
<div id="score-banner">
  <div>
    <div class="score-number" id="score-num">—</div>
    <div class="score-level" id="score-level">—</div>
    <div class="score-meta" id="score-meta"></div>
  </div>
  <div class="dims" id="dims-container">
    <div class="dim-item">
      <span class="dim-label" data-i18n="dim_d1">军事强度</span>
      <div class="dim-bar-wrap"><div class="dim-bar" id="bar-d1" style="width:0;background:var(--critical)"></div></div>
      <span class="dim-val" id="val-d1">—</span>
    </div>
    <div class="dim-item">
      <span class="dim-label" data-i18n="dim_d2">升级趋势</span>
      <div class="dim-bar-wrap"><div class="dim-bar" id="bar-d2" style="width:0;background:var(--high)"></div></div>
      <span class="dim-val" id="val-d2">—</span>
    </div>
    <div class="dim-item">
      <span class="dim-label" data-i18n="dim_d3">核武风险</span>
      <div class="dim-bar-wrap"><div class="dim-bar" id="bar-d3" style="width:0;background:#ff8c42"></div></div>
      <span class="dim-val" id="val-d3">—</span>
    </div>
    <div class="dim-item">
      <span class="dim-label" data-i18n="dim_d4">地域扩散</span>
      <div class="dim-bar-wrap"><div class="dim-bar" id="bar-d4" style="width:0;background:var(--medium)"></div></div>
      <span class="dim-val" id="val-d4">—</span>
    </div>
    <div class="dim-item">
      <span class="dim-label" data-i18n="dim_d5">外交状态</span>
      <div class="dim-bar-wrap"><div class="dim-bar" id="bar-d5" style="width:0;background:var(--accent)"></div></div>
      <span class="dim-val" id="val-d5">—</span>
    </div>
  </div>
  <div class="nuclear-badge" id="nuclear-badge">☢ 核强制规则触发</div>
</div>

<div class="layout">
  <aside>
    <h2 data-i18n="statistics">Statistics</h2>
    <div id="stats-box">
      <div class="stat-row"><span data-i18n="total_events">Total events</span><span id="s-total">—</span></div>
      <div class="stat-row"><span data-i18n="critical">Critical</span><span id="s-critical" class="badge critical">—</span></div>
      <div class="stat-row"><span data-i18n="high">High</span><span id="s-high" class="badge high">—</span></div>
      <div class="stat-row"><span data-i18n="medium">Medium</span><span id="s-medium" class="badge medium">—</span></div>
      <div class="stat-row"><span data-i18n="low">Low</span><span id="s-low" class="badge low">—</span></div>
    </div>

    <div class="filter-group" style="margin-top:20px;">
      <h2 data-i18n="filters">Filters</h2>
      <label data-i18n="severity">Severity</label>
      <select id="f-severity">
        <option value="" data-i18n="all">All</option>
        <option value="critical" data-i18n="critical">Critical</option>
        <option value="high" data-i18n="high">High</option>
        <option value="medium" data-i18n="medium">Medium</option>
        <option value="low" data-i18n="low">Low</option>
      </select>
      <label data-i18n="source">Source</label>
      <input id="f-source" data-i18n-placeholder="source_placeholder" placeholder="e.g. Reuters World" />
      <label data-i18n="limit">Limit</label>
      <select id="f-limit">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
      <button id="apply-btn" onclick="loadEvents()" data-i18n="apply">Apply</button>
    </div>

    <div style="margin-top:24px;">
      <h2 data-i18n="top_sources">Top Sources</h2>
      <div id="source-list"></div>
    </div>
  </aside>

  <main>
    <div class="toolbar">
      <input id="search" data-i18n-placeholder="search_placeholder" placeholder="Search titles…" oninput="filterTable()" />
      <span id="last-updated"></span>
    </div>
    <div id="table-container"><div class="loading" data-i18n="loading">Loading…</div></div>
  </main>
</div>

<script>
// ── i18n ────────────────────────────────────────────────────────────────────
const I18N = {
  en: {
    title: 'Iran Conflict Monitor',
    statistics: 'Statistics',
    total_events: 'Total events',
    critical: 'Critical',
    high: 'High',
    medium: 'Medium',
    low: 'Low',
    filters: 'Filters',
    severity: 'Severity',
    all: 'All',
    source: 'Source',
    source_placeholder: 'e.g. Reuters World',
    limit: 'Limit',
    apply: 'Apply',
    top_sources: 'Top Sources',
    search_placeholder: 'Search titles…',
    loading: 'Loading…',
    no_events: 'No events found.',
    updated: 'Updated',
    events_count: (n) => `${n} events`,
    th_severity: 'Severity',
    th_event: 'Event',
    th_source: 'Source',
    th_published: 'Published',
    lang_switch_label: '中文',
    dim_d1: 'Military',
    dim_d2: 'Trend',
    dim_d3: 'Nuclear',
    dim_d4: 'Spread',
    dim_d5: 'Diplomacy',
    score_label: 'Conflict Severity',
    nuclear_badge: '☢ Nuclear Override',
  },
  zh: {
    title: '伊朗冲突监控',
    statistics: '统计',
    total_events: '事件总数',
    critical: '极危',
    high: '高危',
    medium: '中危',
    low: '低危',
    filters: '筛选',
    severity: '严重程度',
    all: '全部',
    source: '来源',
    source_placeholder: '如：BBC World',
    limit: '条数限制',
    apply: '应用',
    top_sources: '主要来源',
    search_placeholder: '搜索标题…',
    loading: '加载中…',
    no_events: '未找到相关事件。',
    updated: '更新于',
    events_count: (n) => `${n} 条事件`,
    th_severity: '等级',
    th_event: '事件',
    th_source: '来源',
    th_published: '发布时间',
    lang_switch_label: 'English',
    dim_d1: '军事强度',
    dim_d2: '升级趋势',
    dim_d3: '核武风险',
    dim_d4: '地域扩散',
    dim_d5: '外交状态',
    score_label: '冲突严重程度',
    nuclear_badge: '☢ 核强制规则触发',
  },
};

const SEV_LABEL = {
  en: { critical: 'Critical', high: 'High', medium: 'Medium', low: 'Low' },
  zh: { critical: '极危', high: '高危', medium: '中危', low: '低危' },
};

let lang = localStorage.getItem('icm-lang') || 'en';

function t(key) {
  return I18N[lang][key] ?? I18N['en'][key] ?? key;
}

function applyI18n() {
  document.documentElement.lang = lang;
  document.title = t('title');
  document.getElementById('lang-label').textContent = t('lang_switch_label');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    el.placeholder = t(key);
  });

  // Re-render table and score level on lang change
  filterTable();
  loadScore();
}

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('icm-lang', lang);
  applyI18n();
}

// ── Score ────────────────────────────────────────────────────────────────────

function scoreColorClass(s) {
  if (s >= 80) return 'score-l80';
  if (s >= 60) return 'score-l60';
  if (s >= 40) return 'score-l40';
  if (s >= 20) return 'score-l20';
  return 'score-l0';
}

async function loadScore() {
  try {
    const r = await fetch('/api/score');
    if (!r.ok) return;
    const s = await r.json();

    const numEl = document.getElementById('score-num');
    numEl.textContent = s.score != null ? s.score.toFixed(1) : '—';
    numEl.className = 'score-number ' + scoreColorClass(s.score);

    document.getElementById('score-level').textContent =
      lang === 'zh' ? (s.level_zh || '—') : (s.level_en || '—');
    document.getElementById('score-meta').textContent =
      s.computed_at ? t('updated') + ': ' + new Date(s.computed_at).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US') : '';

    const dims = s.dimensions || {};
    ['d1','d2','d3','d4','d5'].forEach(k => {
      const v = dims[k];
      const pct = v != null ? (v / 10 * 100).toFixed(0) + '%' : '0%';
      document.getElementById('bar-' + k).style.width = pct;
      document.getElementById('val-' + k).textContent = v != null ? v.toFixed(1) : '—';
    });

    const badge = document.getElementById('nuclear-badge');
    badge.style.display = s.nuclear_override ? 'block' : 'none';
    badge.textContent = t('nuclear_badge');
  } catch (e) {
    // score not yet available — silently ignore
  }
}

// ── Data ────────────────────────────────────────────────────────────────────
let allEvents = [];

async function loadStats() {
  const r = await fetch('/api/stats');
  const s = await r.json();
  document.getElementById('s-total').textContent = s.total ?? 0;
  document.getElementById('s-critical').textContent = s.by_severity?.critical ?? 0;
  document.getElementById('s-high').textContent = s.by_severity?.high ?? 0;
  document.getElementById('s-medium').textContent = s.by_severity?.medium ?? 0;
  document.getElementById('s-low').textContent = s.by_severity?.low ?? 0;

  const srcList = document.getElementById('source-list');
  srcList.innerHTML = Object.entries(s.by_source || {})
    .map(([src, cnt]) => `<div class="stat-row"><span style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px" title="${src}">${src}</span><span style="color:var(--muted);font-size:12px">${cnt}</span></div>`)
    .join('');

  if (s.last_fetch) {
    document.getElementById('last-updated').textContent =
      t('updated') + ': ' + new Date(s.last_fetch).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US');
  }
}

async function loadEvents() {
  const severity = document.getElementById('f-severity').value;
  const source = document.getElementById('f-source').value.trim();
  const limit = document.getElementById('f-limit').value;
  let url = `/api/events?limit=${limit}`;
  if (severity) url += `&severity=${encodeURIComponent(severity)}`;
  if (source) url += `&source=${encodeURIComponent(source)}`;

  document.getElementById('table-container').innerHTML = `<div class="loading">${t('loading')}</div>`;
  const r = await fetch(url);
  allEvents = await r.json();
  document.getElementById('header-count').textContent = I18N[lang].events_count(allEvents.length);
  filterTable();
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q ? allEvents.filter(e => e.title.toLowerCase().includes(q)) : allEvents;

  if (!filtered.length) {
    document.getElementById('table-container').innerHTML = `<div id="empty">${t('no_events')}</div>`;
    return;
  }

  const sevLabels = SEV_LABEL[lang];
  const rows = filtered.map(e => {
    const tags = (e.tags || '').split(',').filter(Boolean).map(tag => {
      const zhTag = TAG_ZH[tag] || tag;
      return `<span class="tag">${lang === 'zh' ? zhTag : tag}</span>`;
    }).join('');
    const pub = e.published
      ? new Date(e.published).toLocaleString(lang === 'zh' ? 'zh-CN' : 'en-US')
      : '—';
    const sevText = sevLabels[e.severity] || e.severity;
    return `<tr>
      <td><span class="sev ${e.severity}">${sevText}</span></td>
      <td>
        <div class="event-title"><a href="${e.url || '#'}" target="_blank" rel="noopener">${escHtml(e.title)}</a></div>
        <div class="event-meta">${escHtml(e.summary || '')}</div>
        ${tags ? `<div style="margin-top:4px">${tags}</div>` : ''}
      </td>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${escHtml(e.source)}</td>
      <td style="white-space:nowrap;color:var(--muted);font-size:12px">${pub}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-container').innerHTML = `
    <table>
      <thead><tr>
        <th style="width:90px">${t('th_severity')}</th>
        <th>${t('th_event')}</th>
        <th style="width:140px">${t('th_source')}</th>
        <th style="width:160px">${t('th_published')}</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Tag translations
const TAG_ZH = {
  nuclear: '核武器',
  missile: '导弹',
  drone: '无人机',
  sanctions: '制裁',
  diplomacy: '外交',
  proxy: '代理武装',
  israel: '以色列',
  us: '美国',
  irgc: '伊斯兰革命卫队',
  assassination: '暗杀',
};

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
  await Promise.all([loadStats(), loadEvents(), loadScore()]);
}

// Init
applyI18n();
refresh();
setInterval(refresh, 60_000);
</script>
</body>
</html>
